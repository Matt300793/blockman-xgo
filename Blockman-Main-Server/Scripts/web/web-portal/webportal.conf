[program:webportal]
directory=/home/console/webservices/web-portal
command=/home/console/webservices/web-portal/venv/bin/gunicorn app:app -b 0.0.0.0:5000
autostart=true
autorestart=true
stderr_logfile=/home/console/webservices/web-portal/logs/webportal.err.log
stdout_logfile=/home/console/webservices/web-portal/logs/webporatl.out.log