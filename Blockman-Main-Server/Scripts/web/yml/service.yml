- name: deploy {{ service }}
  hosts: "{{ service }}"
  remote_user: deploy
  serial: 1
  vars:
    work_dir: "{{ playdir }}"
  tasks:
  - file: path=./apps state=directory mode=755
  - file: path=./logs state=directory mode=755
  - file: path=./logs/supervisor state=directory mode=755
  - name: cp {{ service }} jar
    copy: |
      src={{ work_dir }}/apps/{{ service }}-0.0.1-SNAPSHOT.jar
      dest=/home/deploy/apps/{{ service }}-0.0.1-SNAPSHOT.jar
      backup=yes
      mode=600 
  - name: cp service ini
    template: src={{ work_dir }}/templates/service.ini.j2 dest=/etc/supervisor/conf.d/{{ service }}.ini
  
  - name: delete backup file, keep the latest 10 backcp
    shell: |
      if [ $(ls -t /home/deploy/apps/{{ service }}* | wc -l) -gt 10 ]
      then 
        ls -t /home/deploy/apps/{{ service }}* | tail -n +11 | xargs rm
      fi

  - file: path=./jks state=directory mode=755
    when: service == 'singleton-service'
  - name: cp google refund key
    copy: |
      src=~/src/pickaxe/server/com/sandbox/service/singleton-service/src/main/resources/gpa-key.p12
      dest=/home/deploy/jks/gpa-key.p12
      mode=600
    when: service == 'singleton-service'
  - file: path=./jks state=directory mode=755
    when: service == 'pay-service'
  - name: cp google acknowledge key
    copy: |
      src=~/src/pickaxe/server/com/sandbox/service/pay-service/src/main/resources/gpa-key.p12
      dest=/home/deploy/jks/gpa-key.p12
      mode=600
    when: service == 'pay-service'
  - name: cp game reward rule file
    copy: |
      src=~/src/pickaxe/server/com/sandbox/center/game-center/src/main/resources/templates/
      dest=/home/deploy/resources/game
      mode=600
    when: service == 'game-center'
  - name: cp payssion pay config file
    copy: |
      src=~/src/pickaxe/server/com/sandbox/center/pay-center/src/main/resources/
      dest=/home/deploy/resources/pay
      mode=600
    when: service == 'pay-center'
  - name: cp clan task config file
    copy: |
      src=~/src/pickaxe/server/conf/json/
      dest=/home/deploy/resources/clan
      mode=600
    when: service == 'clan-center'
  - name: cp game country config file
    copy: |
      src=~/src/pickaxe/server/com/sandbox/service/game-service/src/main/resources/
      dest=/home/deploy/resources/game
      mode=600
    when: service == 'game-service'
  - name: cp activity config file
    copy: |
      src=~/src/pickaxe/server/com/sandbox/service/activity-service/src/main/resources/json/
      dest=/home/deploy/resources/activity
      mode=600
    when: service == 'activity-service'
  - name: cp user center config file
    copy: |
      src=~/src/pickaxe/server/com/sandbox/center/user-center/src/main/resources/
      dest=/home/deploy/resources/user
      mode=600
    when: service == 'user-center'

  - name: restart
    supervisorctl: |
      name="{{service}}"
      state=restarted
    when: action == "restart"
  - name: update
    supervisorctl: |
      name="{{service}}"
      state=restarted
    when: action == "update"
  - name: start supervisord
    supervisorctl: |
      name="{{service}}"
      state=present
    when: action == 'start'
  - name: stop
    supervisorctl: |
      name="{{service}}"
      state=stopped
    when: action == "stop"
  - name: pause 40 waiting for service ready
    pause: seconds=40
    when: action == "restart"
  - name: pause 40 waiting for service ready
    pause: seconds=40
    when: action == "update"