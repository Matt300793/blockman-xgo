    instanceType: m5.xlarge
    cpu: 0.1
    memory: 0.2
    count: 1
    remix: remixinstall
  - type: center
    instanceType: m5.xlarge
    cpu: 0.1
    memory: 0.1
    count: 1
    remix: remixinstall
  - type: gateway
    instanceType: m5.xlarge
    cpu: 0.1
    memory: 0.1
    count: 1 
    remix: remixinstall
  - type: eureka
    instanceType: m5.xlarge
    cpu:  0.1
    memory: 0.1
    count: 1
    remix: remixinstall

services:
  - name: message-process
    cpu: 0.1
    memory: 0.1
    count: 1
    remix: remixinstall
