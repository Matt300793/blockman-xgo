# 预留cpu给操作系统使用
reservedCpu: 
  # fixed: 固定大小，fixed-service: 按服务数量叠加，每个服务固定大小
  strategy: fixed
  value: 0.3

# 预留内存给操作系统使用
reservedMemory: 
  # fixed: 固定大小，fixed-service: 按服务数量叠加，每个服务固定大小
  strategy: fixed
  value: 0.5

instanceTypeDetails:
  - name: c5.xlarge
    cpu: 4
    memory: 8
  - name: m4.large
    cpu: 2
    memory: 8
  - name: t2.small
    cpu: 1
    memory: 2
  - name: m5.large
    cpu: 2
    memory: 8
  - name: m5.xlarge
    cpu: 4
    memory: 16

profiles:
  us-east-1: oversea
  cn-northwest-1: ningxia-dev

staticConfigs:
  bucket: blockmango-res
  groupKey: monitoring/config/webservice-groups.json
  nodeGroupKey: monitoring/config/webservice-nodes-groups.json